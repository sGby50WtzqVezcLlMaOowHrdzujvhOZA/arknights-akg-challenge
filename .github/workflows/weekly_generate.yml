name: Weekly challenge generation
on:
  schedule:
    - cron: '0 0 15-21 * 0'
  workflow_dispatch:
jobs:
  update-data:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run randomizer
        run: node randomizer.js

      - name: Commit new challenge
        run: |
          git config --global user.name "asshole-3"
          git config --global user.email "actions@github.com"
          git add current_week.json
          git commit -m "Sunday update: New challenges selected" || exit 0
          git push
